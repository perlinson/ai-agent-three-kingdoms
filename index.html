<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国霸业 - AI Agent对战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .player-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .player-card.wei { border-top: 4px solid #3b82f6; }
        .player-card.shu { border-top: 4px solid #10b981; }
        .player-card.wu { border-top: 4px solid #ef4444; }
        
        .player-name { font-size: 1.3em; font-weight: bold; margin-bottom: 10px; }
        .player-icon { font-size: 2em; display: block; margin-bottom: 10px; }
        
        .stat { display: flex; justify-content: space-between; margin: 8px 0; }
        .stat-label { color: #888; }
        .stat-value { font-weight: bold; }
        
        .gold { color: #fbbf24; }
        .food { color: #34d399; }
        .army { color: #f87171; }
        .wisdom { color: #60a5fa; }
        
        .log-area {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9em;
        }
        .log-entry { margin: 5px 0; padding: 5px; border-radius: 3px; }
        .log-entry.turn { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .log-entry.action { color: #aaa; }
        .log-entry.battle { color: #f87171; }
        .log-entry.victory { color: #fbbf24; }
        
        .btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 15px 30px;
            font-size: 1.2em;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .turn-display {
            text-align: center;
            font-size: 1.5em;
            margin: 20px 0;
            color: #667eea;
        }
        
        @media (max-width: 768px) {
            .game-area { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏯 三国霸业</h1>
        <p class="subtitle">AI Agent 智能对战模拟</p>
        
        <div class="turn-display">回合: <span id="turn">0</span> / <span id="maxTurns">30</span></div>
        
        <div class="game-area">
            <div class="player-card wei" id="wei">
                <span class="player-icon">🏛️</span>
                <div class="player-name">魏 - 曹操</div>
                <div class="stat"><span class="stat-label">💰 金币</span><span class="stat-value gold" id="wei-gold">1000</span></div>
                <div class="stat"><span class="stat-label">🌾 粮草</span><span class="stat-value food" id="wei-food">1000</span></div>
                <div class="stat"><span class="stat-label">⚔️ 军队</span><span class="stat-value army" id="wei-army">500</span></div>
                <div class="stat"><span class="stat-label">📖 智慧</span><span class="stat-value wisdom" id="wei-wisdom">80</span></div>
            </div>
            
            <div class="player-card shu" id="shu">
                <span class="player-icon">🐉</span>
                <div class="player-name">蜀 - 刘备</div>
                <div class="stat"><span class="stat-label">💰 金币</span><span class="stat-value gold" id="shu-gold">1000</span></div>
                <div class="stat"><span class="stat-label">🌾 粮草</span><span class="stat-value food" id="shu-food">1000</span></div>
                <div class="stat"><span class="stat-label">⚔️ 军队</span><span class="stat-value army" id="shu-army">500</span></div>
                <div class="stat"><span class="stat-label">📖 智慧</span><span class="stat-value wisdom" id="shu-wisdom">80</span></div>
            </div>
            
            <div class="player-card wu" id="wu">
                <span class="player-icon">⚔️</span>
                <div class="player-name">吴 - 孙权</div>
                <div class="stat"><span class="stat-label">💰 金币</span><span class="stat-value gold" id="wu-gold">1000</span></div>
                <div class="stat"><span class="stat-label">🌾 粮草</span><span class="stat-value food" id="wu-food">1000</span></div>
                <div class="stat"><span class="stat-label">⚔️ 军队</span><span class="stat-value army" id="wu-army">500</span></div>
                <div class="stat"><span class="stat-label">📖 智慧</span><span class="stat-value wisdom" id="wu-wisdom">80</span></div>
            </div>
        </div>
        
        <button class="btn" id="nextTurn" onclick="nextTurn()">下一回合</button>
        
        <div class="log-area" id="log"></div>
    </div>
    
    <script>
        // 游戏状态
        const game = {
            turn: 0,
            maxTurns: 30,
            players: {
                wei: { name: '魏', leader: '曹操', gold: 1000, food: 1000, army: 500, wisdom: 80, cities: 4 },
                shu: { name: '蜀', leader: '刘备', gold: 1000, food: 1000, army: 500, wisdom: 80, cities: 4 },
                wu: { name: '吴', leader: '孙权', gold: 1000, food: 1000, army: 500, wisdom: 80, cities: 4 }
            }
        };
        
        const strategies = {
            wei: ['aggressive', 'balanced', 'defensive'],
            shu: ['diplomatic', 'balanced', 'defensive'],
            wu: ['trading', 'balanced', 'expansionist']
        };
        
        const actions = ['trade', 'recruit', 'research', 'diplomacy', 'strategy'];
        
        const cities = {
            wei: ['许昌', '洛阳', '邺城', '南阳'],
            shu: ['成都', '汉中', '荆州', '云南'],
            wu: ['建业', '武昌', '会稽', '交州']
        };
        
        function log(msg, type = 'action') {
            const logArea = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = msg;
            logArea.insertBefore(entry, logArea.firstChild);
        }
        
        function updateUI() {
            document.getElementById('turn').textContent = game.turn;
            document.getElementById('maxTurns').textContent = game.maxTurns;
            
            for (const faction of ['wei', 'shu', 'wu']) {
                const p = game.players[faction];
                document.getElementById(`${faction}-gold`).textContent = p.gold;
                document.getElementById(`${faction}-food`).textContent = p.food;
                document.getElementById(`${faction}-army`).textContent = p.army;
                document.getElementById(`${faction}-wisdom`).textContent = p.wisdom;
            }
        }
        
        function nextTurn() {
            game.turn++;
            log(`=== 第 ${game.turn} 回合 ===`, 'turn');
            
            for (const faction of ['wei', 'shu', 'wu']) {
                const p = game.players[faction];
                if (p.army <= 0) continue;
                
                // AI决策
                const strategy = strategies[faction][Math.floor(Math.random() * 3)];
                const action = actions[Math.floor(Math.random() * actions.length)];
                
                // 执行行动
                let result = '';
                switch(action) {
                    case 'trade':
                        const tradeGain = Math.floor(Math.random() * 100) + 50;
                        p.gold += tradeGain;
                        result = `💰 贸易获得 ${tradeGain} 金币`;
                        break;
                    case 'recruit':
                        const recruits = Math.floor(Math.random() * 50) + 20;
                        if (p.gold >= recruits * 2) {
                            p.army += recruits;
                            p.gold -= recruits * 2;
                            result = `⚔️ 招募 ${recruits} 士兵`;
                        } else {
                            result = `💰 金币不足，无法招募`;
                        }
                        break;
                    case 'research':
                        p.wisdom += Math.floor(Math.random() * 5) + 1;
                        result = `📖 研究智慧 +${Math.floor(Math.random() * 5) + 1}`;
                        break;
                    case 'diplomacy':
                        const target = ['wei', 'shu', 'wu'].filter(f => f !== faction)[Math.floor(Math.random() * 2)];
                        result = `🤝 与${game.players[target].name}外交`;
                        break;
                    case 'strategy':
                        const foodGain = Math.floor(Math.random() * 80) + 30;
                        p.food += foodGain;
                        result = `🌾 征收粮草 ${foodGain}`;
                        break;
                }
                
                // 消耗
                const foodCost = Math.floor(p.army * 0.1);
                p.food -= foodCost;
                
                if (p.food < 0) {
                    p.food = 0;
                    p.army = Math.floor(p.army * 0.8);
                    result += ` (粮草不足，军队损失!)`;
                }
                
                log(`🏛️ ${p.name} (${p.leader}): ${result}`);
                
                // 随机战斗
                if (Math.random() < 0.2) {
                    const target = ['wei', 'shu', 'wu'].filter(f => f !== faction)[Math.floor(Math.random() * 2)];
                    const targetP = game.players[target];
                    if (targetP.army > 0) {
                        const attackPower = p.army * (p.wisdom / 100);
                        const defensePower = targetP.army * (targetP.wisdom / 100);
                        
                        if (attackPower > defensePower) {
                            const loot = Math.floor(targetP.gold * 0.2);
                            p.gold += loot;
                            targetP.gold -= loot;
                            targetP.army = Math.floor(targetP.army * 0.7);
                            result = `⚔️ 击败${targetP.name}，掠夺 ${loot} 金币!`;
                            log(`🩸 ${p.name} 进攻 ${targetP.name}: 胜利!`, 'battle');
                        } else {
                            p.army = Math.floor(p.army * 0.8);
                            result = `⚔️ 进攻${targetP.name}失败!`;
                            log(`🩸 ${p.name} 进攻 ${targetP.name}: 失败!`, 'battle');
                        }
                    }
                }
            }
            
            updateUI();
            
            // 检查游戏结束
            const alive = Object.values(game.players).filter(p => p.army > 0);
            if (alive.length === 1 || game.turn >= game.maxTurns) {
                let winner = alive.reduce((a, b) => a.army > b.army ? a : b);
                log(`🏆 游戏结束! 胜利者: ${winner.name} (${winner.leader})`, 'victory');
                document.getElementById('nextTurn').disabled = true;
            }
        }
        
        // 初始化
        log('🏯 三国霸业开始! 魏蜀吴三国争霸!', 'turn');
        updateUI();
    </script>
</body>
</html>
